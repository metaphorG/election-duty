<div class="search-card">
  <label>
    તમારો ૧૦ અંકનો મોબાઈલ નંબર દાખલ કરો<br>
    <span style="font-size:14px;color:#a08060;">(Enter your 10-digit Mobile Number)</span>
  </label>
  <input
    type="tel" 
    id="uidInput"
    placeholder="9924xxxxxx"
    autocomplete="off"
    inputmode="numeric"
    maxlength="10"
    onkeydown="if(event.key==='Enter') doSearch()"
  >
  <button class="btn-search" onclick="doSearch()">🔍 &nbsp; વિગત મેળવો (Get Details)</button>
</div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTKxlpr-uAoZV-QaeX5l5Epe0o9141kQqh-ZS3K7RpguNKret-Jlh4rwlx3OKZLJlFArnpOI8mMEjxM/pub?gid=0&single=true&output=csv";

// Mapped to match the columns in your image
const COL = {
  route:      "Route number",
  ward:       "Ward Number",
  boothNo:    "Booth number",
  boothName:  "Booth Name",
  zonal:      "Zonal name and Phone",
  assZonal:   "Ass Zonal name and Phone",
  pr:         "PR",
  prMo:       "PR - MO",
  apr:        "APR",
  aprMo:      "APR - MO",
  po:         "PO",
  poMo:       "PO - MO",
  fpo:        "FPO",
  fpoMo:      "FPO - MO"
};

// Define roles and their specific data and mobile columns
const ROLES = [
  { nameCol: 'pr',  moCol: 'prMo',  label: 'Presiding Officer (PR)' },
  { nameCol: 'apr', moCol: 'aprMo', label: 'Asst. Presiding Officer (APR)' },
  { nameCol: 'po',  moCol: 'poMo',  label: 'Polling Officer (PO)' },
  { nameCol: 'fpo', moCol: 'fpoMo', label: 'First Polling Officer (FPO)' }
];

let sheetData = null;

// Clean input to keep only digits
function cleanPhone(s) {
  return (s || '').toString().replace(/\D/g, '').trim();
}

async function loadSheet() {
  if (sheetData) return true;
  showStatus('📡 ડેટા લોડ થઈ રહ્યો છે...', 'load');
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    sheetData = parseCSV(text);
    document.getElementById('statusMsg').style.display = 'none';
    return true;
  } catch (e) {
    showStatus('❌ કનેક્શન પ્રોબ્લેમ. ફરી પ્રયાસ કરો.', 'err');
    return false;
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const row = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  });
}

async function doSearch() {
  const input = document.getElementById('uidInput').value.trim();
  const searchMo = cleanPhone(input);
  const resultEl = document.getElementById('resultCard');

  if (searchMo.length !== 10) {
    showStatus('⚠️ કૃપા કરીને ૧૦ અંકનો સાચો મોબાઈલ નંબર લખો.', 'err');
    return;
  }

  const ok = await loadSheet();
  if (!ok) return;

  let matchedRow = null, matchedRole = null;

  // Search through all rows and all role mobile columns
  for (const row of sheetData) {
    for (const role of ROLES) {
      if (cleanPhone(row[COL[role.moCol]]) === searchMo) {
        matchedRow = row;
        matchedRole = role;
        break;
      }
    }
    if (matchedRow) break;
  }

  if (!matchedRow) {
    showStatus('❌ આ મોબાઈલ નંબરની કોઈ વિગત મળી નથી.', 'err');
    resultEl.style.display = 'none';
    return;
  }
  
  renderResult(matchedRow, matchedRole);
}

function renderResult(row, myRole) {
  const rc = document.getElementById('resultCard');
  const myName = row[COL[myRole.nameCol]];
  const myMo = row[COL[myRole.moCol]];

  // Build teammates list (all roles except the one searched)
  const teammates = ROLES
    .filter(r => r.moCol !== myRole.moCol)
    .map(r => `
      <div class="officer-block">
        <div class="officer-role">${r.label}</div>
        <span class="officer-name">${row[COL[r.nameCol]] || '—'}</span>
        ${row[COL[r.moCol]] ? `<a href="tel:${row[COL[r.moCol]]}" class="call-btn">📞 ${row[COL[r.moCol]]}</a>` : '<p class="no-num">નંબર ઉપલ્બ્ધ નથી</p>'}
      </div>
    `).join('');

  // Extract Zonal info - assuming format "Name - Number" or just name
  const zonalRaw = row[COL.zonal] || '';
  const assZonalRaw = row[COL.assZonal] || '';

  rc.innerHTML = `
    <div class="res-head">
      <h2>${myName}</h2>
      <span class="role-badge">${myRole.label}</span>
    </div>
    <div class="info-section">
      <div class="info-row"><span class="info-label">વોર્ડ</span><span class="info-val">${row[COL.ward]}</span></div>
      <div class="info-row"><span class="info-label">રૂટ નંબર</span><span class="info-val">${row[COL.route]}</span></div>
      <div class="info-row"><span class="info-label">બૂથ નંબર</span><span class="info-val">${row[COL.boothNo]}</span></div>
      <div class="info-row"><span class="info-label">બૂથ સ્થળ</span><span class="info-val">${row[COL.boothName]}</span></div>
    </div>
    <div class="my-section">
      <div class="my-label">📌 તમારી વિગત</div>
      <span class="my-name">${myName}</span>
      <a href="tel:${myMo}" class="call-btn">📞 ${myMo}</a>
    </div>
    <div class="team-section">
      <div class="team-divider">— તમારી ટીમ —</div>
      ${teammates}
    </div>
    <div class="zonal-section">
      <div class="zonal-title">— અધિકારીઓ —</div>
      <div class="officer-block">
        <div class="officer-role">ઝોનલ અધિકારી</div>
        <span class="officer-name">${zonalRaw}</span>
      </div>
      <div class="officer-block">
        <div class="officer-role">સહાયક ઝોનલ અધિકારી</div>
        <span class="officer-name">${assZonalRaw}</span>
      </div>
    </div>
    <div class="notice">
      માહિતીમાં ફેરફાર હોઈ શકે છે, ઝોનલ અધિકારીનો સંપર્ક કરવો.
    </div>`;

  rc.style.display = 'block';
  document.getElementById('statusMsg').style.display = 'none';
  rc.scrollIntoView({ behavior: 'smooth' });
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}
</script>
