
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap');
.guj { font-family: 'Noto Sans Gujarati', sans-serif; }
.raj { font-family: 'Rajdhani', sans-serif; }

.inner { padding:16px; max-width:480px; margin:0 auto; }

.geo-card .ico { font-size:40px; margin-bottom:12px; }
.geo-card h2 { font-size:20px; color:#FFB347; font-family:'Noto Sans Gujarati',sans-serif; margin-bottom:10px; }
.geo-card p { font-size:16px; color:#dcc8b0; font-family:'Noto Sans Gujarati',sans-serif; line-height:1.6; }
.verified-bar { background:#1e1208; border:2px solid #2ECC71; border-radius:12px; padding:10px 16px; text-align:center; margin-bottom:14px; }
.verified-bar span { color:#2ECC71; font-weight:700; font-size:15px; font-family:'Noto Sans Gujarati',sans-serif; }
.search-card { background:#1e1208; border:2px solid #3a2010; border-radius:16px; padding:20px 16px; }
.search-card label { display:block; font-family:'Noto Sans Gujarati',sans-serif; font-weight:700; color:#dcc8b0; font-size:15px; margin-bottom:10px; }
#uidInput { width:100%; background:#fff; border:3px solid #3a2010; border-radius:10px; color:#000; font-size:22px; font-weight:700; padding:12px; text-align:center; font-family:'Rajdhani',sans-serif; }
.btn-srch { background:#FF6B00; color:#000; border:none; border-radius:10px; padding:14px; font-size:20px; font-weight:700; font-family:'Rajdhani',sans-serif; cursor:pointer; width:100%; margin-top:12px; }

.res-head h2 { font-size:22px; font-weight:800; color:#000; font-family:'Noto Sans Gujarati',sans-serif; line-height:1.3; }
.role-badge { display:inline-block; background:#000; color:#FF6B00; font-size:13px; font-weight:700; padding:4px 14px; border-radius:20px; margin-top:8px; font-family:'Rajdhani',sans-serif; letter-spacing:1px; }
.info-section { padding:0 16px; }
.info-row { padding:12px 0; border-bottom:1px solid #eee; }
.info-label { display:block; font-size:13px; color:#888; font-weight:700; font-family:'Noto Sans Gujarati',sans-serif; margin-bottom:3px; }
.info-val { display:block; font-size:18px; font-weight:800; color:#000; font-family:'Noto Sans Gujarati',sans-serif; line-height:1.3; }
.my-section { background:#fff8f0; border:2px solid #FF6B00; margin:14px 16px; border-radius:12px; padding:14px; }
.my-section .my-label { font-size:13px; color:#FF6B00; font-weight:700; font-family:'Noto Sans Gujarati',sans-serif; margin-bottom:6px; }
.my-section .my-name { font-size:19px; font-weight:800; color:#000; font-family:'Noto Sans Gujarati',sans-serif; display:block; margin-bottom:10px; }
.team-section { padding:0 16px 8px; }
.team-divider { text-align:center; font-size:14px; font-weight:700; color:#888; font-family:'Noto Sans Gujarati',sans-serif; padding:12px 0 8px; border-top:1px solid #eee; margin-top:4px; }
.officer-block { margin-bottom:14px; }
.officer-role { font-size:14px; color:#FF6B00; font-weight:700; font-family:'Noto Sans Gujarati',sans-serif; border-bottom:1px solid #ddd; padding-bottom:4px; margin-bottom:8px; }
.officer-name { font-size:18px; font-weight:800; color:#000; font-family:'Noto Sans Gujarati',sans-serif; display:block; margin-bottom:8px; }
.call-btn { display:flex; align-items:center; justify-content:center; gap:8px; background:#27ae60; color:#fff; text-decoration:none; padding:12px; border-radius:10px; font-weight:700; font-size:18px; font-family:'Rajdhani',sans-serif; }
.zonal-section { background:#fdf2e9; border-top:2px solid #eee; padding:14px 16px; }
.notice { background:#fff3e0; border:2px solid #FF6B00; color:#d35400; padding:14px 16px; margin:14px 16px; border-radius:12px; font-family:'Noto Sans Gujarati',sans-serif; font-size:15px; font-weight:700; line-height:1.5; text-align:center; }
</style>

<div class="app-wrap">
  <div class="app-header">
    <div class="emb">🗳️</div>
    <h1>અમદાવાદ મહાનગરપાલિકા <span>વોર્ડ નં. ૧૧, ૧૨, ૧૪</span> ની સામાન્ય ચૂંટણી</h1>
    <p>વિગતવાર હુકમની માહિતી</p>
  </div>

  <div class="inner">
    <div id="geoGate" class="geo-card">
      <div class="ico">📍</div>
      <h2>લોકેશન ચકાસણી થઈ રહી છે...</h2>
      <p>કૃપા કરી થોભો. તમારી હાજરી ચકાસવામાં આવી રહી છે.</p>
    </div>

    <div id="mainContent" style="display:none;">
      <div class="verified-bar">
        <span>✅ લોકેશન વેરીફાય થઈ ગયું છે</span>
      </div>
      <div class="search-card">
        <label>Unique ID દાખલ કરો (દા.ત. pr-1, APR-2, PO-3, FPO-4):</label>
        <input type="text" id="uidInput" placeholder="pr-1" autocomplete="off">
        <button class="btn-srch" onclick="doSearch()">શોધો (Search)</button>
      </div>
      <div id="statusMsg" style="display:none;"></div>
      <div id="resultCard" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTKxlpr-uAoZV-QaeX5l5Epe0o9141kQqh-ZS3K7RpguNKret-Jlh4rwlx3OKZLJlFArnpOI8mMEjxM/pubhtml";

setTimeout(() => {
  document.getElementById('geoGate').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}, 2200);

let sheetData = null;

const COL = {
  ward: "વોર્ડ નંબર",
  route: "રૂટ નંબર",
  boothNo: "મતદાન મથક નંબર",
  boothName: "મતદાન મથકનું નામ અને સરનામું",
  zonal: "ઝોનલ અધિકારીનું નામ,મોબાઈલ નંબર",
  asstZonal: "મદદ.ઝોનલ અધિકારીનું નામ, મોબાઈલ નંબર",
  prCode: "Pr unique code",
  prInfo: "Pr- name and number",
  aprCode: "apr unique code",
  aprInfo: "APR- name and number",
  poCode: "po unique code",
  poInfo: "PO- name and number",
  fpoCode: "fpo unique code",
  fpoInfo: "FPO- name and number"
};

function cleanId(s) {
  return (s||'').toLowerCase().replace(/[\s\-]/g,'').replace(/(\d+)/,m=>parseInt(m,10)+'');
}

function splitNamePhone(s) {
  if (!s) return {name:'—', phone:''};
  const parts = s.split(' - ');
  if (parts.length >= 2) {
    const phone = parts[parts.length-1].trim();
    const name = parts.slice(0, parts.length-1).join(' - ').trim();
    return {name: name||'—', phone: /^\d{10}$/.test(phone) ? phone : ''};
  }
  return {name: s.trim(), phone:''};
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const row = {};
    headers.forEach((h,i) => row[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
    return row;
  });
}

function callBtn(phone) {
  if (!phone) return '';
  return `<a href="tel:${phone}" class="call-btn">📞 &nbsp;${phone}</a>`;
}

function officerBlock(roleLabel, namePhone) {
  const {name, phone} = splitNamePhone(namePhone);
  return `<div class="officer-block">
    <div class="officer-role">${roleLabel}</div>
    <span class="officer-name">${name}</span>
    ${callBtn(phone)}
  </div>`;
}

const ROLES = [
  {code: 'prCode',  info: 'prInfo',  label: 'Presiding Officer (PR)'},
  {code: 'aprCode', info: 'aprInfo', label: 'Asst. Presiding Officer (APR)'},
  {code: 'poCode',  info: 'poInfo',  label: 'Polling Officer (PO)'},
  {code: 'fpoCode', info: 'fpoInfo', label: 'First Polling Officer (FPO)'},
];

async function doSearch() {
  const uid = document.getElementById('uidInput').value.trim();
  const statusEl = document.getElementById('statusMsg');
  const resultEl = document.getElementById('resultCard');
  statusEl.style.display = 'none';
  resultEl.style.display = 'none';
  if (!uid) { showStatus('⚠️ ID દાખલ કરો','err'); return; }

  if (!sheetData) {
    showStatus('📡 ડેટા લો  થઈ રહ્યો છે...','load');
    try {
      const r = await fetch(SHEET_URL);
      sheetData = parseCSV(await r.text());
      statusEl.style.display = 'none';
    } catch(e) {
      showStatus('❌ ડેટા લો  કરવામાં ભૂલ','err'); return;
    }
  }

  let matchedRow = null;
  let matchedRole = null;
  for (const row of sheetData) {
    for (const role of ROLES) {
      if (cleanId(row[COL[role.code]]) === cleanId(uid)) {
        matchedRow = row;
        matchedRole = role;
        break;
      }
    }
    if (matchedRow) break;
  }

  if (!matchedRow) {
    showStatus('❌ આ ID ની વિગત મળી નથી.','err'); return;
  }

  renderResult(matchedRow, matchedRole);
}

function renderResult(row, myRole) {
  const rc = document.getElementById('resultCard');
  const myNP = splitNamePhone(row[COL[myRole.info]]);
  const myCode = row[COL[myRole.code]];

  const teammates = ROLES.filter(r => r.code !== myRole.code).map(r => {
    const np = splitNamePhone(row[COL[r.info]]);
    return `<div class="officer-block">
      <div class="officer-role">${r.label}</div>
      <span class="officer-name">${np.name}</span>
      ${callBtn(np.phone)}
    </div>`;
  }).join('');

  const zonalNP = splitNamePhone(row[COL.zonal]);
  const asstNP = splitNamePhone(row[COL.asstZonal]);

  rc.innerHTML = `
    <div class="res-head">
      <div class="rid">ID: ${myCode}</div>
      <h2>${myNP.name}</h2>
      <span class="role-badge">${myRole.label}</span>
    </div>
    <div class="info-section">
      <div class="info-row"><span class="info-label">વોર્ડ</span><span class="info-val">${row[COL.ward]||'—'}</span></div>
      <div class="info-row"><span class="info-label">રૂટ નંબર</span><span class="info-val">${row[COL.route]||'—'}</span></div>
      <div class="info-row"><span class="info-label">બૂથ નંબર</span><span class="info-val">${row[COL.boothNo]||'—'}</span></div>
      <div class="info-row" style="border:none;"><span class="info-label">બૂથ સ્થળ</span><span class="info-val">${row[COL.boothName]||'—'}</span></div>
    </div>
    <div class="my-section">
      <div class="my-label">📌 તમારો નંબર</div>
      <span class="my-name">${myNP.name}</span>
      ${callBtn(myNP.phone)}
    </div>
    <div class="team-section">
      <div class="team-divider">— તમારી ટીમ —</div>
      ${teammates}
    </div>
    <div class="zonal-section">
      ${officerBlock('ઝોનલ અધિકારી', row[COL.zonal])}
      ${officerBlock('સહાયક ઝોનલ અધિકારી', row[COL.asstZonal])}
    </div>
    <div class="notice">અહીં ફક્ત માહિતી આપવામાં આવેલ છે. આપનો વિગતવાર ઓર્ડર આપના ઝોનલ અધિકારીશ્રી પાસેથી અચૂક મેળવી લેવાનો રહેશે.</div>
  `;
  rc.style.display = 'block';
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}
</script>
