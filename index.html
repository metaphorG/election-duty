<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0800">
<title>ચૂંટણી ફરજ કાર્ડ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #FF6B00;
    --deep: #1a0800;
    --card: #1e1208;
    --border: #3a2010;
    --accent: #FFB347;
    --green: #27ae60;
    --text: #ffffff;
    --subtext: #dcc8b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  header {
    background: #2a1200;
    border-bottom: 4px solid var(--saffron);
    padding: 22px 16px 18px;
    text-align: center;
  }
  .emblem { font-size: 38px; margin-bottom: 8px; }
  header h1 {
    font-size: 20px; font-weight: 700; color: #fff;
    font-family: 'Noto Sans Gujarati', sans-serif;
    line-height: 1.45; margin-bottom: 6px;
  }
  header h1 span { color: var(--saffron); }
  header p { font-size: 15px; color: var(--subtext); font-family: 'Noto Sans Gujarati', sans-serif; }
  .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 16px 14px 50px; }

  /* GEO GATE */
  .geo-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 18px; padding: 36px 20px; text-align: center;
  }
  .geo-card .ico { font-size: 52px; margin-bottom: 16px; }
  .geo-card h2 { font-size: 22px; color: var(--accent); font-family: 'Noto Sans Gujarati', sans-serif; margin-bottom: 12px; }
  .geo-card p { font-size: 17px; color: var(--subtext); font-family: 'Noto Sans Gujarati', sans-serif; line-height: 1.65; }

  /* VERIFIED BAR */
  .verified-bar {
    background: rgba(39,174,96,0.12); border: 2px solid var(--green);
    border-radius: 12px; padding: 12px 16px; text-align: center; margin-bottom: 14px;
  }
  .verified-bar span { color: var(--green); font-weight: 700; font-size: 17px; font-family: 'Noto Sans Gujarati', sans-serif; }

  /* SEARCH CARD */
  .search-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 18px; padding: 20px 16px;
  }
  .search-card label {
    display: block; font-family: 'Noto Sans Gujarati', sans-serif;
    font-weight: 600; color: var(--subtext); font-size: 16px;
    margin-bottom: 12px; line-height: 1.5;
  }
  #uidInput {
    width: 100%; background: #fff; border: 3px solid #ccc;
    border-radius: 12px; color: #000; font-size: 28px; font-weight: 700;
    padding: 16px 12px; text-align: center; font-family: 'Rajdhani', sans-serif;
    margin-bottom: 14px; -webkit-appearance: none; appearance: none;
  }
  #uidInput:focus { outline: none; border-color: var(--saffron); }
  .btn-search {
    background: var(--saffron); color: #000; border: none;
    border-radius: 14px; padding: 18px; font-size: 22px; font-weight: 700;
    font-family: 'Rajdhani', sans-serif; cursor: pointer; width: 100%;
    min-height: 58px; -webkit-appearance: none; appearance: none;
  }
  .btn-search:active { opacity: 0.8; }

  /* STATUS */
  .status {
    margin: 14px 0; padding: 14px; border-radius: 10px; font-weight: 700;
    text-align: center; font-family: 'Noto Sans Gujarati', sans-serif;
    font-size: 17px; line-height: 1.5;
  }
  .err  { background: #fee; color: #c00; border: 1px solid #fcc; }
  .load { background: #fffde7; color: #856404; border: 1px solid #ffeeba; }

  /* RESULT CARD */
  #resultCard {
    margin-top: 18px; background: #fff;
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .res-head { background: var(--saffron); padding: 20px 16px; text-align: center; }
  .res-head .rid { font-size: 14px; font-weight: 700; color: #000; margin-bottom: 4px; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
  .res-head h2 { font-size: 24px; font-weight: 800; color: #000; font-family: 'Noto Sans Gujarati', sans-serif; line-height: 1.3; }
  .role-badge { display: inline-block; background: #000; color: var(--saffron); font-size: 14px; font-weight: 700; padding: 5px 16px; border-radius: 20px; margin-top: 10px; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.5px; }
  .info-section { padding: 0 16px; }
  .info-row { padding: 13px 0; border-bottom: 1px solid #eee; }
  .info-row:last-child { border-bottom: none; }
  .info-label { display: block; font-size: 13px; color: #888; font-weight: 700; font-family: 'Noto Sans Gujarati', sans-serif; margin-bottom: 3px; }
  .info-val { display: block; font-size: 19px; font-weight: 800; color: #000; font-family: 'Noto Sans Gujarati', sans-serif; line-height: 1.35; }
  .my-section { background: #fff8f0; border: 2px solid var(--saffron); margin: 14px 14px 0; border-radius: 14px; padding: 16px; }
  .my-label { font-size: 13px; color: var(--saffron); font-weight: 700; font-family: 'Noto Sans Gujarati', sans-serif; margin-bottom: 6px; }
  .my-name { font-size: 20px; font-weight: 800; color: #000; font-family: 'Noto Sans Gujarati', sans-serif; display: block; margin-bottom: 12px; line-height: 1.35; }
  .team-section { padding: 0 14px 6px; }
  .team-divider { text-align: center; font-size: 15px; font-weight: 700; color: #999; font-family: 'Noto Sans Gujarati', sans-serif; padding: 16px 0 10px; border-top: 1px solid #eee; margin-top: 14px; }
  .officer-block { margin-bottom: 16px; }
  .officer-role { font-size: 14px; color: var(--saffron); font-weight: 700; font-family: 'Noto Sans Gujarati', sans-serif; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; }
  .officer-name { font-size: 19px; font-weight: 800; color: #000; font-family: 'Noto Sans Gujarati', sans-serif; display: block; margin-bottom: 10px; line-height: 1.35; }
  .call-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--green); color: #fff; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 20px; font-family: 'Rajdhani', sans-serif; min-height: 54px; }
  .call-btn:active { opacity: 0.8; }
  .zonal-section { background: #fdf2e9; border-top: 2px solid #eee; padding: 16px 14px 6px; margin-top: 14px; }
  .zonal-title { font-size: 15px; font-weight: 700; color: #999; font-family: 'Noto Sans Gujarati', sans-serif; text-align: center; margin-bottom: 14px; }
  .notice { background: #fff3e0; border: 2px solid var(--saffron); color: #d35400; padding: 16px; margin: 14px; border-radius: 12px; font-family: 'Noto Sans Gujarati', sans-serif; font-size: 15px; font-weight: 700; line-height: 1.6; text-align: center; }
  .no-num { color: #aaa; font-size: 14px; font-family: 'Noto Sans Gujarati', sans-serif; margin: 4px 0; }
</style>
</head>
<body>

<header>
  <div class="emblem">🗳️</div>
  <h1>અમદાવાદ મહાનગરપાલિકા<br><span>વોર્ડ નં. ૧૧, ૧૨, ૧૪</span> ની સામાન્ય ચૂંટણી</h1>
  <p>વિગતવાર હુકમની માહિતી</p>
</header>

<div class="container">

  <!-- FAKE GEO GATE -->
  <div id="geoGate" class="geo-card">
    <div class="ico">📍</div>
    <h2>લોકેશન ચકાસણી થઈ રહી છે...</h2>
    <p>કૃપા કરી થોભો.<br>તમારી હાજરી ચકાસવામાં આવી રહી છે.</p>
  </div>

  <!-- MAIN CONTENT -->
  <div id="mainContent" style="display:none;">

    <div class="verified-bar">
      <span>✅ લોકેશન વેરીફાય થઈ ગયું છે</span>
    </div>

    <div class="search-card">
      <label>
        તમારો મોબાઇલ નંબર દાખલ કરો<br>
        <span style="font-size:14px;color:#a08060;"></span>
      </label>
      <input
        type="tel"
        id="uidInput"
        placeholder="9999999999"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        inputmode="numeric"
        maxlength="10"
        enterkeyhint="search"
        onkeydown="if(event.key==='Enter') doSearch()"
      >
      <button class="btn-search" onclick="doSearch()">🔍 &nbsp; શોધો (Search)</button>
    </div>

    <div id="statusMsg" style="display:none;" class="status"></div>
    <div id="resultCard" style="display:none;"></div>

  </div>
</div>

<script>
// ── SHEET URLs ───────────────────────────────────────────
// Main duty data sheet
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTKxlpr-uAoZV-QaeX5l5Epe0o9141kQqh-ZS3K7RpguNKret-Jlh4rwlx3OKZLJlFArnpOI8mMEjxM/pub?gid=0&single=true&output=csv";
// Special list sheet (columns: Name, Mobile Number) — shows EVM collection message
const SPECIAL_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQKXnkHzON5_y1OplDf4RuefbF7uL0mx9-oBeCF08cN5QJkhl-wcLZFTV0oUhLg8ghh37rAHb7D6O4q/pub?gid=1832761596&single=true&output=csv";
// ────────────────────────────────────────────────────────

/*
  NEW SHEET COLUMN HEADERS (must match your sheet exactly):
  Route number | Ward Number | Booth number | Booth Name
  Zonal name and Phone | Ass Zonal name and Phone
  PR | PR - MO | APR | APR - MO | PO | PO - MO | FPO | FPO - MO
*/
const COL = {
  route:      "Route number",
  ward:       "Ward Number",
  boothNo:    "Booth number",
  boothName:  "Booth Name",
  zonal:      "Zonal name and Phone",
  asstZonal:  "Ass Zonal name and Phone",
  prName:     "PR",
  prMo:       "PR - MO",
  aprName:    "APR",
  aprMo:      "APR - MO",
  poName:     "PO",
  poMo:       "PO - MO",
  fpoName:    "FPO",
  fpoMo:      "FPO - MO"
};

// Each role: nameCol = column for name, moCol = column for mobile
const ROLES = [
  { nameCol: 'prName',  moCol: 'prMo',  label: 'Presiding Officer (PR)'         },
  { nameCol: 'aprName', moCol: 'aprMo', label: 'Asst. Presiding Officer (APR)'  },
  { nameCol: 'poName',  moCol: 'poMo',  label: 'Polling Officer (PO)'            },
  { nameCol: 'fpoName', moCol: 'fpoMo', label: 'First Polling Officer (FPO)'     },
];

// Fake geo: 2.2s delay then unlock
setTimeout(() => {
  document.getElementById('geoGate').style.display    = 'none';
  document.getElementById('mainContent').style.display = 'block';
}, 2200);

let sheetData   = null;
let specialData = null;

// Normalize mobile: strip spaces/dashes, keep digits only
function cleanMobile(s) {
  return (s || '').replace(/\D/g, '').trim();
}

// Parse CSV (handles quoted fields with commas)
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const vals = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    const row  = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  });
}

async function loadSheet() {
  if (sheetData) return true;
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    sheetData = parseCSV(await res.text());
    return true;
  } catch (e) {
    return false;
  }
}

function showEvmMessage() {
  const resultEl = document.getElementById('resultCard');
  resultEl.innerHTML = `
    <div style="background:#fff8e1; border:3px solid #FF6B00; border-radius:18px; padding:28px 20px; text-align:center; margin-top:4px;">
      <div style="font-size:48px; margin-bottom:14px;">📋</div>
      <p style="font-size:19px; font-weight:700; color:#d35400; font-family:'Noto Sans Gujarati',sans-serif; line-height:1.75;">
        આપે આપનો વિગતવાર ઓર્ડર મેળવવા માટે EVM વિતરણ કેન્દ્ર ની સામે પહેલા માળે જવાનુ રહેશે. વધુ માહિતી માટે સંપર્ક કરો અંકિતભાઇ મેવાડા - 9714553392
      </p>
    </div>`;
  resultEl.style.display = 'block';
  setTimeout(() => resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

async function loadSpecialSheet() {
  if (specialData) return true;
  try {
    const res = await fetch(SPECIAL_CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    specialData = parseCSV(await res.text());
    return true;
  } catch (e) {
    specialData = [];
    return false;
  }
}

async function doSearch() {
  const inputVal  = document.getElementById('uidInput').value.trim();
  const statusEl  = document.getElementById('statusMsg');
  const resultEl  = document.getElementById('resultCard');

  statusEl.style.display = 'none';
  resultEl.style.display = 'none';

  if (!inputVal) { showStatus('⚠️ મોબાઇલ નંબર દાખલ કરો', 'err'); return; }

  const mobile = cleanMobile(inputVal);
  if (mobile.length !== 10) { showStatus('⚠️ કૃપા કરી 10 અંકનો સાચો મોબાઇલ નંબર દાખલ કરો', 'err'); return; }

  showStatus('📡 ડેટા લોડ થઈ રહ્યો છે...', 'load');

  // Load both sheets in parallel
  await Promise.all([loadSheet(), loadSpecialSheet()]);

  statusEl.style.display = 'none';

  // 1️⃣ Check special sheet first
  if (specialData && specialData.length) {
    const specialMatch = specialData.find(row => {
      const cols = Object.values(row);
      return cols.some(v => cleanMobile(v) === mobile);
    });
    if (specialMatch) {
      showEvmMessage();
      return;
    }
  }

  // 2️⃣ Check main duty sheet
  if (!sheetData) {
    showStatus('❌ ડેટા લોડ કરવામાં ભૂલ આવી. ઇન્ટરનેટ તપાસો અને ફરી પ્રયાસ કરો.', 'err');
    return;
  }

  let matchedRow = null, matchedRole = null;
  for (const row of sheetData) {
    for (const role of ROLES) {
      const rowMobile = cleanMobile(row[COL[role.moCol]]);
      if (rowMobile === mobile) {
        matchedRow = row; matchedRole = role; break;
      }
    }
    if (matchedRow) break;
  }

  if (!matchedRow) {
    showStatus('❌ આપનો મોબાઇલ નંબર ફરી ચકાસીને સાચો દાખલ કરો અથવા WhatsApp ગ્રુપ‌માં મૂકવામાં આવેલ PDF માંથી આપના ઓર્ડર અંગેની માહિતી મેળવો.', 'err');
    return;
  }
  renderResult(matchedRow, matchedRole);
}

function callBtn(phone) {
  const p = cleanMobile(phone);
  if (!p) return '<p class="no-num">નંબર ઉપલ્બ્ધ નથી</p>';
  return `<a href="tel:${p}" class="call-btn">📞 &nbsp;${p}</a>`;
}

// Split "Name - 9999999999" for zonal/asst zonal fields (still combined in old format)
function splitNamePhone(s) {
  if (!s) return { name: '—', phone: '' };
  const idx = s.lastIndexOf(' - ');
  if (idx !== -1) {
    const name  = s.slice(0, idx).trim() || '—';
    const phone = s.slice(idx + 3).trim();
    return { name, phone: /^\d{10}$/.test(cleanMobile(phone)) ? cleanMobile(phone) : '' };
  }
  return { name: s.trim(), phone: '' };
}

function officerBlock(roleLabel, name, mobile) {
  const displayName = name || '—';
  return `<div class="officer-block">
    <div class="officer-role">${roleLabel}</div>
    <span class="officer-name">${displayName}</span>
    ${callBtn(mobile)}
  </div>`;
}

function zonalBlock(roleLabel, combined) {
  const { name, phone } = splitNamePhone(combined);
  return `<div class="officer-block">
    <div class="officer-role">${roleLabel}</div>
    <span class="officer-name">${name}</span>
    ${callBtn(phone)}
  </div>`;
}

function renderResult(row, myRole) {
  const rc       = document.getElementById('resultCard');
  const myName   = row[COL[myRole.nameCol]] || '—';
  const myMobile = cleanMobile(row[COL[myRole.moCol]]);

  const teammates = ROLES
    .filter(r => r.moCol !== myRole.moCol)
    .map(r => officerBlock(r.label, row[COL[r.nameCol]], row[COL[r.moCol]]))
    .join('');

  rc.innerHTML = `
    <div class="res-head">
      <div class="rid">📱 ${myMobile}</div>
      <h2>${myName}</h2>
      <span class="role-badge">${myRole.label}</span>
    </div>
    <div class="info-section">
      <div class="info-row">
        <span class="info-label">વોર્ડ નંબર</span>
        <span class="info-val">${row[COL.ward] || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">રૂટ નંબર</span>
        <span class="info-val">${row[COL.route] || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">બૂથ નંબર</span>
        <span class="info-val">${row[COL.boothNo] || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">બૂથ સ્થળ</span>
        <span class="info-val">${row[COL.boothName] || '—'}</span>
      </div>
    </div>
    <div class="my-section">
      <div class="my-label">📌 તમારી માહિતી</div>
      <span class="my-name">${myName}</span>
      ${callBtn(myMobile)}
    </div>
    <div class="team-section">
      <div class="team-divider">— તમારી ટીમ —</div>
      ${teammates}
    </div>
    <div class="zonal-section">
      <div class="zonal-title">— અધિકારીઓ —</div>
      ${zonalBlock('ઝોનલ અધિકારી', row[COL.zonal])}
      ${zonalBlock('સહાયક ઝોનલ અધિકારી', row[COL.asstZonal])}
    </div>
    <div class="notice">
      અહીં ફક્ત માહિતી આપવામાં આવેલ છે.<br>
      આપનો વિગતવાર ઓર્ડર આપના ઝોનલ અધિકારીશ્રી પાસેથી અચૂક મેળવી લેવાનો રહેશે.
    </div>`;

  rc.style.display = 'block';
  setTimeout(() => rc.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent   = msg;
  el.className     = 'status ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
